<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo Interstitial</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f0f0; }

  /* ── OVERLAY ── */
  #interstitial {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.6);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999;
    padding: 12px;
  }

  /* ── CARD ── */
  .card {
    background: #fff;
    border-radius: 14px;
    width: 100%; max-width: 340px;
    max-height: calc(100vh - 24px);
    overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,.4);
    position: relative;
    display: flex; flex-direction: column;
  }

  /* ── CLOSE ── */
  #closeBtn {
    position: absolute; top: 8px; right: 8px;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(0,0,0,.65); color: #fff;
    border: none; font-size: 14px; line-height: 28px; text-align: center;
    cursor: pointer; z-index: 10;
    opacity: 0; pointer-events: none;
    transition: opacity .3s;
  }
  #closeBtn.visible { opacity: 1; pointer-events: all; }

  /* ── VIDEO ── */
  .video-wrap {
    position: relative;
    width: 100%;
    height: calc(100vh - 24px - 120px);
    max-height: 500px;
    background: #000;
    overflow: hidden;
    flex-shrink: 0;
  }
  .video-wrap video {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }

  /* mute toggle */
  #muteBtn {
    position: absolute; bottom: 8px; left: 8px;
    background: rgba(0,0,0,.5); border: none; color: #fff;
    border-radius: 50%; width: 28px; height: 28px;
    font-size: 13px; cursor: pointer; line-height: 28px; text-align: center;
  }

  /* ── BODY ── */
  .card-body { padding: 10px 14px 12px; flex-shrink: 0; }

  .label {
    font-size: 10px; font-weight: 700; letter-spacing: .7px;
    color: #999; text-transform: uppercase; margin-bottom: 2px;
  }

  .card-body h2 {
    font-size: 14px; font-weight: 700; color: #111;
    line-height: 1.25; margin-bottom: 2px;
  }

  .card-body p {
    font-size: 11px; color: #666; line-height: 1.4; margin-bottom: 8px;
  }

  /* ── TIMER BAR ── */
  .timer-bar-wrap {
    background: #eee; border-radius: 99px; height: 3px; margin-bottom: 8px; overflow: hidden;
  }
  #timerBar {
    height: 100%; background: #2563eb; border-radius: 99px;
    width: 100%; transition: width 1s linear;
  }

  /* ── CTA ── */
  .cta {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    background: #111; color: #fff;
    border: none; border-radius: 8px;
    padding: 9px 16px; width: 100%;
    font-size: 13px; font-weight: 600; cursor: pointer;
    text-decoration: none; transition: background .2s;
  }
  .cta:hover { background: #333; }
  .cta svg { flex-shrink: 0; }

  /* ── SKIP TEXT ── */
  #skipText {
    text-align: center; font-size: 10px; color: #bbb; margin-top: 6px;
  }
</style>
</head>
<body>

<div style="padding:40px;text-align:center;color:#999;font-size:14px;">
  (Contenido de tu página)
</div>

<div id="interstitial">
  <div class="card">

    <button id="closeBtn" onclick="cerrar()" title="Cerrar">✕</button>

    <!-- VIDEO -->
    <div class="video-wrap">
      <video id="adVideo"
        src="https://www.dropbox.com/scl/fi/jf1cgdyyfffel9uee8w2m/AD1.mp4?rlkey=nynzlb3p9ttcjax50o4vdm0b6&st=aqdxkk1l&raw=1"
        autoplay playsinline loop>
      </video>
      <button id="muteBtn" onclick="toggleMute()">🔊</button>
    </div>

    <!-- TEXTO -->
    <div class="card-body">
      <p class="label">Oferta por tiempo limitado</p>
      <h2>Aprendé a hacer Sushi Dulce y empezá a vender desde tu casa</h2>
      <p>Sin experiencia previa. Recetas, técnicas y todo para emprender. <strong style="color:#e91e8c">Solo $7 USD</strong></p>

      <div class="timer-bar-wrap"><div id="timerBar"></div></div>

      <a href="https://tu-url.com"  class="cta" target="_blank" rel="noopener">
        ¡Obtené el método ahora!
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5"
             viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </a>

      <p id="skipText">Tu recurso se está preparando…</p>
    </div>

  </div>
</div>

<script>
  const WAIT_SECONDS = 30;
  const AUTO_CLOSE   = false;

  let remaining = WAIT_SECONDS;
  const bar      = document.getElementById('timerBar');
  const closeBtn = document.getElementById('closeBtn');
  const skipText = document.getElementById('skipText');

  bar.style.width = '100%';

  const interval = setInterval(() => {
    remaining--;
    bar.style.width = (remaining / WAIT_SECONDS * 100) + '%';
    if (remaining <= 0) {
      clearInterval(interval);
      closeBtn.classList.add('visible');
      skipText.textContent = 'Ya podés cerrar este anuncio ✓';
      if (AUTO_CLOSE) cerrar();
    } else {
      skipText.textContent = `Tu recurso se está preparando… (${remaining}s)`;
    }
  }, 1000);

  function cerrar() {
    document.getElementById('interstitial').style.display = 'none';
    // window.location.href = '/tu-recurso.pdf';
  }

  const vid = document.getElementById('adVideo');
  function toggleMute() {
    vid.muted = !vid.muted;
    document.getElementById('muteBtn').textContent = vid.muted ? '🔇' : '🔊';
  }
</script>

</body>
</html>
